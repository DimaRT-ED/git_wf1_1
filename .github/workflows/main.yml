name: Work with environments
env:
  APP_NAME: "${{ github.repository }}-TEST-APP"
  OWNER: "Dima"
on:
  pull_request:
    branches:
      - master
      - dev

  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - name: say hello
        run: echo "Hello World!!!"

      - name: multiline command
        run: |
          ls -la
          pwd
          echo "App name: ${{ env.APP_NAME }}, owned by ${{ env.OWNER }}"
          echo "github action: ${{ github.action }}"
          echo "Event : ${{ github.event_name }}"
      #          sleep 5
      - uses: actions/checkout@v3

      - run: ls -la

  job-2:
    runs-on: ubuntu-latest
    needs: ["job-1"]
    env:
      VAR1: "var_1_value"
      VAR2: "var_2_value"
    steps:
      - name: say hello
        run: echo "Hello World!!!"

      - name: multiline command
        run: |
          ls -la
          pwd
          echo "VAR-1 = ${{ env.VAR1 }}"
          echo "VAR-2 = ${{ env.VAR2 }}"
          echo "App name: ${{ env.APP_NAME }}, owned by ${{ env.OWNER }} " >> tmp.txt
          echo "LOCAL variable = $LOCAL_VAR1"
        env:
          LOCAL_VAR1: "local_var_1_value"

      - run: ls -la
