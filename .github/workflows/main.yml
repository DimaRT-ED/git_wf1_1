name: Work with environments
env:
  APP_NAME: "${{ github.repository }}-TEST-APP"
  OWNER: "Dima"
on:
  push:
    branches:
      - master
      - dev

  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - name: say hello
        run: echo "Hello World!!!"

      - name: multiline command
        run: |
          ls -la
          pwd
          echo "App name: ${{ env.APP_NAME }}, owned by ${{ env.OWNER }}"
          echo "github action: ${{ github.action }}"
          echo "Event : ${{ github.event_name }}"
      #          sleep 5
      - uses: actions/checkout@v3

      - run: ls -la

  job-2:
    runs-on: ubuntu-latest
    needs: ["job-1"]
    steps:
      - name: say hello
        run: echo "Hello World!!!"

      - name: multiline command
        run: |
          ls -la
          pwd
          echo "HI !"

      - uses: actions/checkout@v3

      - run: ls -la
